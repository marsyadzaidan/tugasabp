<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktikum Bootstrap</title>

    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <script 
        src="https://code.jquery.com/jquery-3.7.0.min.js">
    </script>

    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    </script>
</head>


<body>

    <div class="container mt-4">

        <h1 class="text-center fw-bold mb-4">
            Contoh Implementasi Bootstrap
        </h1>


        <h3 class="mb-3">Bootstrap Grid</h3>

        <div class="row mb-2">

            <div class="col-12 col-md-8 bg-primary text-white p-3">
                col-12 col-md-8
            </div>

            <div class="col-6 col-md-4 bg-warning p-3">
                col-6 col-md-4
            </div>

        </div>


        <div class="row mb-4">

            <div class="col-6 col-md-4 bg-success text-white p-3">
                col-6 col-md-4
            </div>

            <div class="col-6 col-md-4 bg-danger text-white p-3">
                col-6 col-md-4
            </div>

            <div class="col-6 col-md-4 bg-info p-3">
                col-6 col-md-4
            </div>

        </div>



        <h3 class="mb-3">Bootstrap Table</h3>

        <table class="table table-hover">

            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Nama Lengkap</th>
                    <th>Asal Kota</th>
                    <th>Umur</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <th>1</th>
                    <td>Budi Rojadi</td>
                    <td>Semarang</td>
                    <td>35</td>
                </tr>

                <tr>
                    <th>2</th>
                    <td>Yulia Santi</td>
                    <td>Bekasi</td>
                    <td>32</td>
                </tr>

                <tr>
                    <th>3</th>
                    <td>Fahri Abdilah</td>
                    <td>Medan</td>
                    <td>38</td>
                </tr>

            </tbody>

        </table>



        <h3 class="mb-3">Bootstrap Image</h3>

        <div class="mb-4">

            <img
                src="https://picsum.photos/500/300"
                class="img-thumbnail me-3"
                alt="Thumbnail Image"
            >

            <img
                src="https://picsum.photos/500/300"
                class="img-fluid"
                alt="Responsive Image"
            >

        </div>



        <h3 class="mb-3">Bootstrap Button</h3>

        <div class="mb-4">

            <button class="btn btn-secondary">
                Secondary
            </button>

            <button class="btn btn-primary btn-lg">
                Primary
            </button>

            <button class="btn btn-success w-100 mt-2">
                Success
            </button>

            <button class="btn btn-info btn-sm mt-2">
                Info
            </button>

            <button class="btn btn-warning">
                Warning
            </button>

            <button class="btn btn-danger">
                Danger
            </button>

            <button class="btn btn-link">
                Link
            </button>

        </div>



        <h3 class="mb-3">Bootstrap Form</h3>

        <form>

            <div class="row mb-3">

                <label class="col-sm-2 col-form-label">
                    Username
                </label>

                <div class="col-sm-10">

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Enter username"
                    >

                </div>

            </div>


            <div class="row mb-3">

                <label class="col-sm-2 col-form-label">
                    Password
                </label>

                <div class="col-sm-10">

                    <input
                        type="password"
                        class="form-control"
                        placeholder="Enter password"
                    >

                </div>

            </div>


            <div class="row">

                <div class="col-sm-10 offset-sm-2">

                    <button
                        type="submit"
                        class="btn btn-success"
                    >
                        Submit
                    </button>

                </div>

            </div>

        </form>

    </div>

</body>
</html>
