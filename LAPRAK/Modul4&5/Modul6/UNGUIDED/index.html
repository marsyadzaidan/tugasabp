<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ramadan Kareem</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: url('thr.jpeg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            margin: 0;
            padding: 0;
        }

        .overlay {
            background: rgba(0,0,0,0.6);
            min-height: 100vh;
            padding-top: 50px;
        }

        h1 {
            font-size: 40px;
        }

        p {
            font-size: 18px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: gold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: orange;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
        }

        .modal-content {
            background-color: white;
            color: black;
            margin: 15% auto;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            animation: muncul 0.5s;
        }

        @keyframes muncul {
            from {transform: scale(0);}
            to {transform: scale(1);}
        }

        .close {
            float: right;
            font-size: 20px;
            cursor: pointer;
        }
    </style>

    <script>
        $(document).ready(function(){

            $("#btnTHR").click(function(){
                $("#myModal").fadeIn();
            });

            $(".close").click(function(){
                $("#myModal").fadeOut();
            });

        });
    </script>
</head>

<body>

    <div class="overlay">
        <h1>🌙 Ramadan Kareem 🌙</h1>
        <p>Selamat menjalankan ibadah puasa</p>

        <button id="btnTHR">Klik untuk dapat THR 🎁</button>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>🎉 Selamat! 🎉</h2>
            <p>Anda mendapatkan THR sebesar Rp 1.000.000</p>
        </div>
    </div>

</body>
</html>
